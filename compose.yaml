services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      SERVER_PORT: "8080"
      DATABASE_PATH: /app/backend/db/trading.db
    ports:
      - "38080:8080"
    volumes:
      - ./backend/data:/app/backend/data
      - backend-db:/app/backend/db
      - ./backend/profiles:/app/backend/profiles:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/v1/status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_HOST: localhost:38080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "33000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    restart: unless-stopped

volumes:
  backend-db:
